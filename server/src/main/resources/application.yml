server:
  port: 8080

spring:
  application:
    name: traffic-warning-server
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/traffic_warning?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

security:
  jwt:
    secret: ${JWT_SECRET:traffic-warning-system-jwt-secret-key-must-be-32bytes-minimum}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}

llm:
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:gpt-4o-mini}

risk:
  scheduler:
    enabled: ${RISK_SCHEDULER_ENABLED:false}
    cron: ${RISK_SCHEDULER_CRON:0 0/30 * * * ?}
